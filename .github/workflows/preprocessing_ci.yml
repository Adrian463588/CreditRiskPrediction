name: "Preprocessing CI - Credit Risk Dataset"

# Triggers: Push ke main, Cron mingguan (23:00 WIB / 16:00 UTC), dan Manual dispatch
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 16 * * 0"  # Setiap hari Minggu 23:00 WIB = 16:00 UTC
  workflow_dispatch:

jobs:
  preprocess:
    name: "Run Data Preprocessing Pipeline"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Run Secrets Leak Scan (DevSecOps)"
        run: python detect_secrets.py

      - name: "Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install Dependencies"
        run: pip install numpy pandas scikit-learn

      - name: "Generate Raw Dataset"
        run: |
          python credit_risk_raw/generate_dataset.py \
            --output credit_risk_raw/credit_risk_dataset.csv \
            --n-samples 32581
          echo "✅ Raw dataset generated: $(wc -l < credit_risk_raw/credit_risk_dataset.csv) rows"

      - name: "Run Preprocessing Automation"
        run: |
          python preprocessing/automate_AdrianSyahAbidin.py \
            --input credit_risk_raw/credit_risk_dataset.csv \
            --output-dir preprocessing/credit_risk_preprocessing
          echo "✅ Preprocessing complete"

      - name: "Validate Output Files"
        run: |
          python - <<'EOF'
          import os, pandas as pd

          output_dir = "preprocessing/credit_risk_preprocessing"
          for fname in ["credit_risk_train.csv", "credit_risk_test.csv"]:
              fpath = os.path.join(output_dir, fname)
              assert os.path.exists(fpath), f"FAIL: {fpath} not found"
              df = pd.read_csv(fpath)
              assert len(df) > 0, f"FAIL: {fpath} is empty"
              assert "loan_status" in df.columns, f"FAIL: target column missing in {fpath}"
              print(f"✅ {fname}: {df.shape[0]:,} rows × {df.shape[1]} cols")
          EOF

      - name: "Upload Preprocessed Dataset as Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "credit-risk-preprocessed-${{ github.run_number }}"
          path: preprocessing/credit_risk_preprocessing/
          retention-days: 30

      - name: "Commit Preprocessed Data back to Repo"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add preprocessing/credit_risk_preprocessing/ || true
          git diff --cached --quiet || git commit -m "ci: update preprocessed credit risk dataset [skip ci]"
          git push || echo "Nothing to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
