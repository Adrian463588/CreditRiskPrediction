name: "Workflow CI - Credit Risk Model Training & Docker Build"

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Number of trees"
        default: "200"
      max_depth:
        description: "Max tree depth"
        default: "12"

env:
  DOCKER_IMAGE_NAME: credit-risk-model
  MLPROJECT_DIR: Workflow-CI/MLProject
  PYTHON_VERSION: "3.12"

jobs:
  # ────────────────────────────────────────────────────────
  # JOB 1: Preprocessing + Training via MLflow Project
  # ────────────────────────────────────────────────────────
  train-and-track:
    name: "Train Model via MLflow Project"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "Install Dependencies"
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.5.2 \
                      dagshub==0.3.36 numpy==1.26.4 \
                      pandas==2.2.3 matplotlib==3.9.2 \
                      seaborn==0.13.2 xgboost==2.1.1

      - name: "Generate Preprocessed Dataset"
        run: |
          cd Eksperimen_SML_AdrianSyahAbidin
          python credit_risk_raw/generate_dataset.py \
            --output credit_risk_raw/credit_risk_dataset.csv
          python preprocessing/automate_AdrianSyahAbidin.py \
            --input credit_risk_raw/credit_risk_dataset.csv \
            --output-dir preprocessing/credit_risk_preprocessing
          # Salin ke MLProject
          cp -r preprocessing/credit_risk_preprocessing \
                ../Workflow-CI/MLProject/credit_risk_preprocessing

      - name: "Run MLflow Project"
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/Adrian463588/CreditRiskPrediction.mlflow"
        run: |
          cd ${{ env.MLPROJECT_DIR }}
          mlflow run . \
            --experiment-name "credit-risk-workflow-ci" \
            --env-manager=local \
            -P n_estimators=${{ github.event.inputs.n_estimators || '200' }} \
            -P max_depth=${{ github.event.inputs.max_depth || '20' }}

      - name: "Upload Model Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "credit-risk-model-artifacts-${{ github.run_number }}"
          path: |
            Workflow-CI/MLProject/mlruns/
            Workflow-CI/MLProject/artifacts/
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # JOB 2: Build & Push Docker Image ke Docker Hub
  # ────────────────────────────────────────────────────────
  docker-build-push:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: train-and-track

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Install MLflow & Dependencies"
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.5.2 \
                      dagshub==0.3.36 numpy==1.26.4 \
                      pandas==2.2.3 matplotlib==3.9.2 \
                      xgboost==2.1.1

      - name: "Download Artifacts from Previous Job"
        uses: actions/download-artifact@v4
        with:
          name: "credit-risk-model-artifacts-${{ github.run_number }}"
          path: ./

      - name: "Generate Fresh Model for Docker (if no prior artifacts)"
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/Adrian463588/CreditRiskPrediction.mlflow"
        run: |
          cd Eksperimen_SML_AdrianSyahAbidin
          python credit_risk_raw/generate_dataset.py \
            --output credit_risk_raw/credit_risk_dataset.csv
          python preprocessing/automate_AdrianSyahAbidin.py \
            --input credit_risk_raw/credit_risk_dataset.csv \
            --output-dir preprocessing/credit_risk_preprocessing
          cp -r preprocessing/credit_risk_preprocessing \
                ../Workflow-CI/MLProject/credit_risk_preprocessing

          cd ../Workflow-CI/MLProject
          python modelling.py

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build Docker Image via MLflow"
        run: |
          mlflow models build-docker \
            --model-uri "Workflow-CI/MLProject/artifacts/credit-risk-model" \
            --name "${{ env.DOCKER_IMAGE_NAME }}"

      - name: "Tag & Push Docker Image"
        run: |
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}"
          docker tag "${{ env.DOCKER_IMAGE_NAME }}:latest" "${IMAGE_TAG}:latest"
          docker tag "${{ env.DOCKER_IMAGE_NAME }}:latest" "${IMAGE_TAG}:${{ github.sha }}"
          docker push "${IMAGE_TAG}:latest"
          docker push "${IMAGE_TAG}:${{ github.sha }}"
          echo "✅ Docker image pushed: ${IMAGE_TAG}:latest"
          echo "DOCKER_IMAGE=${IMAGE_TAG}:latest" >> $GITHUB_ENV

      - name: "Create Docker Hub Reference File"
        run: |
          cat > Workflow-CI/docker_hub_reference.txt << EOF
          Docker Image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          Run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          Built at: $(date -u)
          Commit: ${{ github.sha }}
          EOF

      - name: "Upload Docker Reference"
        uses: actions/upload-artifact@v4
        with:
          name: "docker-hub-reference"
          path: Workflow-CI/docker_hub_reference.txt
