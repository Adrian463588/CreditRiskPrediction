global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "credit-risk-mlops"
    environment: "local"

rule_files:
  - "alerting_rules.yml"

alerting:
  alertmanagers:
    - path_prefix: "/api/prom/alertmanager"
      static_configs:
        - targets: ["grafana:3000"]

scrape_configs:
  - job_name: "credit-risk-api"
    static_configs:
      - targets: ["credit-risk-api:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "prometheus-self"
    static_configs:
      - targets: ["localhost:9090"]
